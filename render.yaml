services:
  - type: web
    name: portfolio-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false          # You set this manually in Render dashboard (secret)
      - key: CLIENT_URL
        sync: false          # Set to your Vercel frontend URL in Render dashboard
    healthCheckPath: /
    autoDeploy: true         # Auto-redeploy when you push to GitHub
